name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Project
        run: |
          cd Springboot-ecommerce-main
          mvn clean install

      - name: Run Tests
        run: |
          cd Springboot-ecommerce-main
          mvn test
